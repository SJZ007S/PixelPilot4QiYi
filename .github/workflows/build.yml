name: Build
on:
  push:
    branches:
      - 'master'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    environment: ANDROID_KEYSTORE
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > pixelpilot.jks

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_PATH: ${{ github.workspace }}/pixelpilot.jks
        run: |
          ./gradlew assembleDebug
          mv app/build/outputs/apk/debug/app-debug.apk PixelPilot_Custom.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelPilot-Fixed-For-QiYi
          path: PixelPilot_Custom.apk


          
